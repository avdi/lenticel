name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/lenticel-caddy

jobs:
  build-caddy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Caddy image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            -f ./server/Dockerfile.caddy \
            ./server
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  deploy:
    needs: build-caddy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Rsync server files to VPS
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='frps.toml' \
            server/ root@${{ secrets.VPS_IP }}:/opt/lenticel/

      - name: Render frps.toml and start Docker stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/lenticel
            set -a && source .env && set +a
            envsubst '${FRP_AUTH_TOKEN} ${LENTICEL_DOMAIN}' < frps.toml.tmpl > frps.toml
            docker compose pull
            docker compose up -d
            docker compose ps

      - name: Deploy lenticel-ctl service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if ! command -v ruby &>/dev/null; then
              apt-get update -qq && apt-get install -y -qq ruby >/dev/null
            fi
            cp /opt/lenticel/lenticel-ctl.service /etc/systemd/system/lenticel-ctl.service
            systemctl daemon-reload
            systemctl enable lenticel-ctl
            systemctl restart lenticel-ctl
            systemctl status lenticel-ctl --no-pager || true
