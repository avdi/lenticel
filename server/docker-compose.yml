services:
  caddy:
    image: ${CADDY_IMAGE:-ghcr.io/lenticel-caddy:latest}
    # To rebuild locally instead: comment out 'image' above and uncomment 'build' below
    # build:
    #   context: .
    #   dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      BUNNY_API_KEY: ${BUNNY_API_KEY}
      LENTICEL_DOMAIN: ${LENTICEL_DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frps

  frps:
    image: snowdreamtech/frps:latest
    restart: unless-stopped
    ports:
      - "7000:7000"
      - "127.0.0.1:7500:7500"  # Admin dashboard — VPS-local only
    volumes:
      - ./frps.toml:/etc/frp/frps.toml:ro

volumes:
  caddy_data:
  caddy_config:
